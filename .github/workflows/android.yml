# =================================================================================
# Android CI/CD workflow
# ---------------------------------------------------------------------------------
# This workflow triggers automatically when code is pushed to the master branch.
# It performs the following actions:
# 1. Set up the Java and Gradle environment.
# 2. Build and sign the release APK using Gradle.
# 3. Calculate SHA256 hashes for build artifacts and generate a build summary.
# 4. Upload APKs and metadata as build artifacts.
# 5. Send build results and APK files to the configured Telegram channel.
# =================================================================================

name: Android CI

# Define workflow trigger conditions
on:
  push:
    branches: [ "master" ]
    # Do not trigger the workflow when the push only involves these file types to save resources.
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.gitignore'
      - '.github/*'
      - '.idea/**'
      - '!.github/workflows/**' # Exception rule: ensure changes to the workflow itself still trigger CI
  workflow_dispatch:

# Set default permissions for all jobs in the workflow.
permissions:
  contents: write # 允许写入内容，例如创建 GitHub Release。
  actions: write  # 允许操作 Actions，例如取消工作流。
  packages: write # 允许写入 GitHub Packages。

# Define jobs in the workflow
jobs:
  build-and-release: # Unique ID for the job

    runs-on: ubuntu-latest # Specify the job runs on the latest Ubuntu virtual environment.

    # Expose secret presence as a job-level env so it can be referenced inside `if:`
    # expressions (secrets cannot be used directly in step-level conditionals).
    env:
      HAS_PUSH_TOKEN: ${{ secrets.PUSH_TOKEN != '' }}

    steps:
      # Step 1: checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史提交记录，以便 `git rev-list` 可以正确计算版本号。

      # Step 2: set up JDK environment
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'        # Specify Java version 21.
          distribution: 'temurin'   # Use the Eclipse Temurin distribution.
          cache: gradle             # Enable Gradle dependency caching to speed up subsequent builds.

      # Step 3: set up the signing keystore
      - name: Setup Keystore
        run: cp .github/echosmart.jks keystore.jks

      # Step 4: build and sign the app
      - name: Build with Gradle
        run: |
          chmod +x gradlew # Make the gradlew script executable.
          ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: "../keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Step 5: prepare artifact information
      - name: Prepare Artifacts, Extract Version String, and Generate Summary
        id: artifacts
        run: |
            apk_dir="app/build/outputs/apk/release"
            apk_file_v8a=$(find "$apk_dir" -name 'OShin_arm64-v8a_v*.apk')
            if [ -z "$apk_file_v8a" ]; then
              echo "::error::arm64-v8a APK not found!"
              exit 1
            fi
            echo "APK_FILE_V8A=$apk_file_v8a" >> $GITHUB_ENV
          
            # Extract full filename
            apk_filename=$(basename "$apk_file_v8a")
            echo "Extracted filename: $apk_filename"
          
            # Remove the prefix "OShin_arm64-v8a_"
            version_with_suffix="${apk_filename#OShin_arm64-v8a_}"
            echo "Version with suffix: $version_with_suffix"
          
            # Remove the suffix ".apk" to obtain the final version string
            version_string="${version_with_suffix%.apk}"
            echo "Extracted version string: $version_string"
          
            # Set the tag_name output to the extracted version string
            echo "tag_name=$version_string" >> $GITHUB_OUTPUT
          
            # Set the name output to the extracted version string
            echo "release_name=$version_string" >> $GITHUB_OUTPUT
          
            # Compute SHA
            sha_v8a=$(sha256sum "$apk_file_v8a" | awk '{print $1}')
            echo "sha_v8a=$sha_v8a" >> $GITHUB_OUTPUT
          
            # Generate summary
            {
              echo "### OShin Build Success :rocket:"
              echo ""
              echo "| Architecture | SHA256 Hash |"
              echo "|:---|:---|"
              echo "| arm64-v8a | \`$sha_v8a\` |"
            } >> $GITHUB_STEP_SUMMARY

      # Step 6: upload build artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OShin-Build-${{ github.sha }} # Specify a unique name for the artifact package containing the commit ID.
          path: app/build/outputs/apk/release/ # Upload all files in the release directory.

      - name: Create Release and Upload Asset to OShin-Builds
        # Only attempt to publish to the external builds repo when the PUSH_TOKEN
        # secret is available. On forks (or when the secret is not configured)
        # we skip this step so the workflow still produces an APK artifact.
        if: ${{ env.HAS_PUSH_TOKEN == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          repository: suqi8/OShin-Builds
          token: ${{ secrets.PUSH_TOKEN }}
          # 使用提取的版本字符串作为 tag_name
          tag_name: ${{ steps.artifacts.outputs.tag_name }}
          # 使用提取的版本字符串作为 Release 的 Name
          name: ${{ steps.artifacts.outputs.release_name }}
          body: |
            Automatic CI build based on commit: ${{ github.sha }}
            Commit message: ${{ github.event.head_commit.message }}
          prerelease: false
          files: ${{ env.APK_FILE_V8A }}

      # 第 7 步：预处理提交信息，清除 Markdown 危险字符并保留换行
      - name: Sanitize multiline commit message for Telegram
        env:
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "处理提交信息，清理特殊字符..."
          delimiter="OSHIN_EOF_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          {
            echo "COMMIT_MSG<<$delimiter"
            printf '%s\n' "$RAW_COMMIT_MSG" | sed 's/[\\`*_()\[\]]/ /g'
            echo "$delimiter"
          } >> "$GITHUB_ENV"

