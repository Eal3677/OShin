name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to run with OpenCode
        required: true
        type: string
      model:
        description: Model to run with OpenCode
        required: false
        # ✅ Cambiado a anthropic/* porque Claude en Foundry usa Messages API (Anthropic), no OpenAI endpoints
        default: anthropic/claude-opus-4-6
        type: string

concurrency:
  group: opencode-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  opencode:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'issues' ||
        github.event_name == 'pull_request' ||
        (
          (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
          (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
          github.event.comment.user.type != 'Bot'
        )
      }}

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    env:
      # Azure Foundry (tu secreto actual)
      AZURE_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY || secrets.AZURE_API_KEY }}
      AZURE_RESOURCE_NAME: ${{ secrets.AZURE_FOUNDRY_RESOURCE_NAME || secrets.AZURE_RESOURCE_NAME }}
      ANTHROPIC_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY || secrets.AZURE_API_KEY }}
      # Modelo elegido (con fallback)
      RAW_MODEL: ${{ github.event.inputs.model || vars.OPENCODE_MODEL || 'anthropic/claude-opus-4-6' }}

      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js for OpenCode dependencies
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode provider dependencies
        run: npm install --no-audit --no-fund

      - name: Normalize model (avoid azure-cognitive-services/claude-* crash)
        id: normalize_model
        shell: bash
        run: |
          set -euo pipefail
          raw="${RAW_MODEL}"

          # ✅ Si te pasan azure-cognitive-services/claude-*, lo convertimos a anthropic/claude-*
          # para evitar el bug de sdk.responses() y usar el endpoint correcto de Foundry.
          if [[ "$raw" == azure-cognitive-services/claude-* ]]; then
            fixed="${raw/azure-cognitive-services\//anthropic/}"
          else
            fixed="$raw"
          fi

          echo "model=$fixed" >> "$GITHUB_OUTPUT"
          echo "Using model: $fixed"

      - name: Create OpenCode auth.json (store Foundry key as anthropic)
        shell: bash
        run: |
          set -euo pipefail
          umask 077

          if [ -z "${AZURE_API_KEY:-}" ]; then
            echo "ERROR: AZURE_API_KEY no está configurado (secrets.AZURE_FOUNDRY_API_KEY o secrets.AZURE_API_KEY)."
            exit 1
          fi

          mkdir -p "$HOME/.local/share/opencode"

          # ✅ OpenCode usa auth.json en ~/.local/share/opencode/auth.json [4](https://opencode.ai/docs/providers/)[5](https://opencode.ai/docs/troubleshooting/)
          cat > "$HOME/.local/share/opencode/auth.json" <<EOF
          {
            "anthropic": {
              "type": "api",
              "key": "${AZURE_API_KEY}"
            }
          }
          EOF

          python - <<'PY'
          import json, os
          p = os.path.expanduser("~/.local/share/opencode/auth.json")
          with open(p, "r", encoding="utf-8") as f:
              json.load(f)
          print("auth.json creado y JSON válido.")
          PY

      - name: Configure OpenCode to use Azure Foundry Anthropic baseURL
        shell: bash
        run: |
          set -euo pipefail
          umask 077

          if [ -z "${AZURE_RESOURCE_NAME:-}" ]; then
            echo "ERROR: AZURE_RESOURCE_NAME no está configurado (secrets.AZURE_FOUNDRY_RESOURCE_NAME o secrets.AZURE_RESOURCE_NAME)."
            exit 1
          fi

          # ✅ Foundry Claude base URL: https://<resource>.services.ai.azure.com/anthropic [3](https://learn.microsoft.com/en-us/azure/foundry/foundry-models/how-to/use-foundry-models-claude)
          BASE_URL="https://${AZURE_RESOURCE_NAME}.services.ai.azure.com/anthropic"

          mkdir -p "$HOME/.config/opencode"
          cat > "$HOME/.config/opencode/opencode.json" <<EOF
          {
            "\$schema": "https://opencode.ai/config.json",
            "provider": {
              "anthropic": {
                "options": {
                  "baseURL": "${BASE_URL}"
                }
              }
            }
          }
          EOF

          echo "opencode.json escrito con baseURL=$BASE_URL"

      - name: Run OpenCode for command comments
        if: >-
          ${{
            github.event_name == 'issue_comment' ||
            github.event_name == 'pull_request_review_comment'
          }}
        uses: anomalyco/opencode/github@latest
        continue-on-error: true
        with:
          model: ${{ steps.normalize_model.outputs.model }}
          agent: build

      - name: Run OpenCode for workflow events
        if: >-
          ${{
            github.event_name != 'issue_comment' &&
            github.event_name != 'pull_request_review_comment'
          }}
        uses: anomalyco/opencode/github@latest
        continue-on-error: true
        with:
          model: ${{ steps.normalize_model.outputs.model }}
          agent: build
          prompt: >-
            ${{
              github.event_name == 'workflow_dispatch' && github.event.inputs.prompt ||
              github.event_name == 'issues' && format('Analyze issue #{0} and implement the required repository changes.', github.event.issue.number) ||
              github.event_name == 'pull_request' && format('Review pull request #{0}, apply needed fixes, and update the branch when required.', github.event.pull_request.number) ||
              ''
            }}

      - name: Leer logs de opencode
        if: ${{ always() }}
        shell: bash
        run: |
          LOG_DIR="$HOME/.local/share/opencode/log"
          echo "==> Revisando logs en: $LOG_DIR"

          if [ ! -d "$LOG_DIR" ]; then
            echo "⚠️  No existe el directorio de logs: $LOG_DIR"
            exit 0
          fi

          echo "==> Archivos:"
          ls -lah "$LOG_DIR" || true

          echo "==> Últimos 300 renglones de los 10 logs más recientes:"
          for f in $(ls -1t "$LOG_DIR" 2>/dev/null | head -n 10); do
            echo
            echo "----- $LOG_DIR/$f -----"
            tail -n 300 "$LOG_DIR/$f" || true
          done

      - name: Empaquetar logs de opencode
        if: ${{ always() }}
        shell: bash
        run: |
          LOG_DIR="$HOME/.local/share/opencode/log"
          if [ -d "$LOG_DIR" ]; then
            tar -czf opencode-logs.tgz -C "$HOME/.local/share/opencode" log
            echo "Logs empaquetados en opencode-logs.tgz"
          else
            echo "No hay logs para empaquetar"
            tar -czf opencode-logs.tgz --files-from /dev/null
          fi

      - name: Subir logs como artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: opencode-logs
          path: opencode-logs.tgz
          if-no-files-found: ignore
          
