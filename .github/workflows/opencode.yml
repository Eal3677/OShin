name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to run with OpenCode
        required: true
        type: string

concurrency:
  group: opencode-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  opencode:
    # Wrap the whole condition in ${{ }} and trim trailing newline with >-
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'issues' ||
        github.event_name == 'pull_request' ||
        (
          (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
          (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
          github.event.comment.user.type != 'Bot'
        )
      }}

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    # Reduce duplication: define env once
    env:
      AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
      AZURE_RESOURCE_NAME: ${{ secrets.AZURE_RESOURCE_NAME }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode for command comments
        if: >-
          ${{
            github.event_name == 'issue_comment' ||
            github.event_name == 'pull_request_review_comment'
          }}
        uses: anomalyco/opencode/github@latest
        with:
          model: azure/gpt-5.3-codex
          agent: build
          token: ${{ github.token }}

      - name: Run OpenCode for workflow events
        if: >-
          ${{
            github.event_name != 'issue_comment' &&
            github.event_name != 'pull_request_review_comment'
          }}
        uses: anomalyco/opencode/github@latest
        with:
          model: azure/gpt-5.3-codex
          agent: build
          token: ${{ github.token }}
          prompt: >-
            ${{
              github.event_name == 'workflow_dispatch' && github.event.inputs.prompt ||
              github.event_name == 'issues' && format('Analyze issue #{0} and implement the required repository changes.', github.event.issue.number) ||
              github.event_name == 'pull_request' && format('Review pull request #{0}, apply needed fixes, and update the branch when required.', github.event.pull_request.number) ||
              ''
            }}
