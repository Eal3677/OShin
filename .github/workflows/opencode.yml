name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to run with OpenCode
        required: true
        type: string
      model:
        description: Model to run with OpenCode
        required: false
        default: anthropic/claude-opus-4-7
        type: string

concurrency:
  group: opencode-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  opencode:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'issues' ||
        github.event_name == 'pull_request' ||
        (
          (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
          (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
          github.event.comment.user.type != 'Bot'
        )
      }}

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write
      statuses: write
      security-events: write
      discussions: write
      attestations: write
      artifact-metadata: write
      repository-projects: write

    env:
      # Azure Foundry API key (used for both AZURE_API_KEY and ANTHROPIC_API_KEY)
      AZURE_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY || secrets.AZURE_API_KEY }}
      AZURE_RESOURCE_NAME: ${{ secrets.AZURE_FOUNDRY_RESOURCE_NAME || secrets.AZURE_RESOURCE_NAME }}
      ANTHROPIC_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY || secrets.AZURE_API_KEY }}
      # Model selection with fallback chain: workflow input > repo variable > default
      RAW_MODEL: ${{ github.event.inputs.model || vars.OPENCODE_MODEL || 'anthropic/claude-opus-4-7' }}

      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js for OpenCode dependencies
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode provider dependencies
        run: npm install --no-audit --no-fund

      - name: Install MCP servers and dependencies
        shell: bash
        run: |
          set -uo pipefail
          echo "==> Pre-installing MCP server packages globally so npx can launch them quickly"
          # Install each one independently so a single failure does not abort the
          # whole step. At runtime, `npx -y <pkg>` will still pull missing ones.
          for pkg in \
            "@modelcontextprotocol/server-sequential-thinking" \
            "@modelcontextprotocol/server-github" \
            "@modelcontextprotocol/server-filesystem" \
            "@playwright/mcp"; do
            echo "---- Installing $pkg ----"
            npm install -g --no-audit --no-fund "$pkg" \
              || echo "WARN: global install of $pkg failed; npx will fetch on demand"
          done

          echo "==> Installed global packages:"
          npm list -g --depth=0 || true

          echo "==> Installing Playwright browsers and OS dependencies"
          # Required for the Playwright MCP server to drive a browser headlessly.
          npx --yes playwright install --with-deps chromium \
            || npx --yes playwright install chromium \
            || echo "WARN: Playwright browser install failed; the playwright MCP server may not work."

      - name: Normalize model name
        id: normalize_model
        shell: bash
        run: |
          set -euo pipefail
          raw="${RAW_MODEL}"

          # Convert azure-cognitive-services/claude-* to anthropic/claude-*
          # to use the correct Anthropic Messages API endpoint via Foundry.
          if [[ "$raw" == azure-cognitive-services/claude-* ]]; then
            fixed="${raw/azure-cognitive-services\//anthropic/}"
          else
            fixed="$raw"
          fi

          echo "model=$fixed" >> "$GITHUB_OUTPUT"
          echo "Using model: $fixed"

      - name: Create OpenCode auth.json
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          if [ -z "${AZURE_API_KEY:-}" ]; then
            echo "ERROR: AZURE_API_KEY is not set."
            exit 1
          fi
          mkdir -p "$HOME/.local/share/opencode"
          AUTH_FILE="$HOME/.local/share/opencode/auth.json"
          printf '{"anthropic":{"type":"api","key":"%s"}}' "$AZURE_API_KEY" > "$AUTH_FILE"
          python3 -c "import json; json.load(open('$AUTH_FILE')); print('auth.json created and validated.')"
      - name: install ocx
        run: |
          curl -fsSL https://ocx.kdco.dev/install.sh | sh
          ocx init --global
          ocx profile add native --source tweak/p-3mdf8wp2 --from https://tweakoc.com/r --global
          
      - name: Configure OpenCode for Azure Foundry and MCP servers
        shell: bash
        env:
          MCP_GITHUB_TOKEN: ${{ secrets.ONT || github.token }}
        run: |
          set -euo pipefail
          umask 077
          if [ -z "${AZURE_RESOURCE_NAME:-}" ]; then
            echo "ERROR: AZURE_RESOURCE_NAME is not set."
            exit 1
          fi
          mkdir -p "$HOME/.config/opencode"
          export BASE_URL="https://${AZURE_RESOURCE_NAME}.services.ai.azure.com/anthropic/v1"
          export CONFIG_FILE="$HOME/.config/opencode/opencode.json"
          export WORKSPACE_DIR="${GITHUB_WORKSPACE:-$PWD}"
          export MCP_GITHUB_TOKEN="${MCP_GITHUB_TOKEN:-}"

          # Build the OpenCode config (provider + MCP servers) with Python so
          # values are escaped correctly. Use a single-line Python program to
          # avoid YAML/heredoc indentation pitfalls.
          python3 -c "import json, os; cfg = {'\$schema': 'https://opencode.ai/config.json', 'provider': {'anthropic': {'options': {'baseURL': os.environ['BASE_URL']}}}, 'mcp': {'sequential-thinking': {'type': 'local', 'command': ['npx', '-y', '@modelcontextprotocol/server-sequential-thinking'], 'enabled': True}, 'github': {'type': 'local', 'command': ['npx', '-y', '@modelcontextprotocol/server-github'], 'environment': {'GITHUB_PERSONAL_ACCESS_TOKEN': os.environ.get('MCP_GITHUB_TOKEN', '')}, 'enabled': True}, 'filesystem': {'type': 'local', 'command': ['npx', '-y', '@modelcontextprotocol/server-filesystem', os.environ['WORKSPACE_DIR']], 'enabled': True}, 'playwright': {'type': 'local', 'command': ['npx', '-y', '@playwright/mcp@latest', '--headless', '--isolated'], 'enabled': True}}}; open(os.environ['CONFIG_FILE'], 'w').write(json.dumps(cfg, indent=2)); print('opencode.json written to', os.environ['CONFIG_FILE']); print('baseURL =', cfg['provider']['anthropic']['options']['baseURL']); print('MCP servers configured:', ', '.join(cfg['mcp'].keys()))"

          # Validate the produced config is valid JSON
          python3 -c "import json; json.load(open('$CONFIG_FILE')); print('opencode.json validated.')"
          echo "==> Final opencode.json contents:"
          cat "$CONFIG_FILE"

      - name: Run OpenCode for command comments
        if: >-
          ${{
            github.event_name == 'issue_comment' ||
            github.event_name == 'pull_request_review_comment'
          }}
        uses: anomalyco/opencode/github@latest
        continue-on-error: true
        with:
          model: ${{ steps.normalize_model.outputs.model }}
          agent: build

      - name: Run OpenCode for workflow events
        if: >-
          ${{
            github.event_name != 'issue_comment' &&
            github.event_name != 'pull_request_review_comment'
          }}
        uses: anomalyco/opencode/github@latest
        continue-on-error: true
        with:
          model: ${{ steps.normalize_model.outputs.model }}
          agent: build
          prompt: >-
            ${{
              github.event_name == 'workflow_dispatch' && github.event.inputs.prompt ||
              github.event_name == 'issues' && format('Analyze issue #{0} and implement the required repository changes.', github.event.issue.number) ||
              github.event_name == 'pull_request' && format('Review pull request #{0}, apply needed fixes, and update the branch when required.', github.event.pull_request.number) ||
              ''
            }}

      - name: Read OpenCode logs
        if: ${{ always() }}
        shell: bash
        run: |
          LOG_DIR="$HOME/.local/share/opencode/log"
          echo "==> Checking logs in: $LOG_DIR"

          if [ ! -d "$LOG_DIR" ]; then
            echo "No log directory found at: $LOG_DIR"
            exit 0
          fi

          echo "==> Files:"
          ls -lah "$LOG_DIR" || true

          echo "==> Last 300 lines of the 10 most recent logs:"
          for f in $(ls -1t "$LOG_DIR" 2>/dev/null | head -n 10); do
            echo
            echo "----- $LOG_DIR/$f -----"
            tail -n 300 "$LOG_DIR/$f" || true
          done

      - name: Package OpenCode logs
        if: ${{ always() }}
        shell: bash
        run: |
          LOG_DIR="$HOME/.local/share/opencode/log"
          if [ -d "$LOG_DIR" ]; then
            tar -czf opencode-logs.tgz -C "$HOME/.local/share/opencode" log
            echo "Logs packaged in opencode-logs.tgz"
          else
            echo "No logs to package"
            tar -czf opencode-logs.tgz --files-from /dev/null
          fi

      - name: Upload logs as artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: opencode-logs
          path: opencode-logs.tgz
          if-no-files-found: ignore
