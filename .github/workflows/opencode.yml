name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to run with OpenCode
        required: true
        type: string
      model:
        description: Model to run with OpenCode
        required: false
        default: azure-cognitive-services/claude-opus-4-6
        type: string

concurrency:
  group: opencode-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  opencode:
    # Wrap the whole condition in ${{ }} and trim trailing newline with >-
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'issues' ||
        github.event_name == 'pull_request' ||
        (
          (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
          (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
          github.event.comment.user.type != 'Bot'
        )
      }}

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    # Reduce duplication: define env once
    env:
      AZURE_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY || secrets.AZURE_API_KEY }}
      AZURE_RESOURCE_NAME: ${{ secrets.AZURE_FOUNDRY_RESOURCE_NAME || secrets.AZURE_RESOURCE_NAME }}
      AZURE_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_FOUNDRY_ENDPOINT }}
      AZURE_FOUNDRY_DEPLOYMENT: ${{ vars.AZURE_FOUNDRY_DEPLOYMENT || 'claude-opus-4-6' }}
      AZURE_FOUNDRY_API_VERSION: ${{ vars.AZURE_FOUNDRY_API_VERSION || '2023-06-01' }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js for OpenCode dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenCode provider dependencies
        run: npm install --no-audit --no-fund
        
      - name: Create OpenCode auth.json (Azure Foundry)
        shell: bash
        env:
          AZURE_FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}
        run: |
          set -euo pipefail
          umask 077

          mkdir -p "$HOME/.local/share/opencode"

          cat > "$HOME/.local/share/opencode/auth.json" <<EOF
          {
            "azure-cognitive-services": {
              "type": "api",
              "key": "${AZURE_FOUNDRY_API_KEY}"
            }
          }
          EOF

          # Validación sin mostrar el secreto
          python - <<'PY'
          import json, os
          p = os.path.expanduser("~/.local/share/opencode/auth.json")
          with open(p, "r", encoding="utf-8") as f:
              json.load(f)
          print("auth.json creado y JSON válido.")
          PY

      - name: Run OpenCode for command comments
        if: >-
          ${{
            github.event_name == 'issue_comment' ||
            github.event_name == 'pull_request_review_comment'
          }}
        uses: anomalyco/opencode/github@latest
        continue-on-error: true
        with:
          model: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.model || vars.OPENCODE_MODEL || 'azure-cognitive-services/claude-opus-4-6' }}
          agent: build

      - name: Run OpenCode for workflow events
        if: >-
          ${{
            github.event_name != 'issue_comment' &&
            github.event_name != 'pull_request_review_comment'
          }}
        uses: anomalyco/opencode/github@latest
        continue-on-error: true
        with:
          model: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.model || vars.OPENCODE_MODEL || 'azure-cognitive-services/claude-opus-4-6' }}
          agent: build
          prompt: >-
            ${{
              github.event_name == 'workflow_dispatch' && github.event.inputs.prompt ||
              github.event_name == 'issues' && format('Analyze issue #{0} and implement the required repository changes.', github.event.issue.number) ||
              github.event_name == 'pull_request' && format('Review pull request #{0}, apply needed fixes, and update the branch when required.', github.event.pull_request.number) ||
              ''
            }}
      - name: Leer logs de opencode
        shell: bash
        run: |
          LOG_DIR="$HOME/.local/share/opencode/log"
          echo "==> Revisando logs en: $LOG_DIR"
          if [ ! -d "$LOG_DIR" ]; then
            echo "⚠️  No existe el directorio de logs: $LOG_DIR"
            exit 0
          fi

          echo "==> Archivos:"
          ls -lah "$LOG_DIR" || true

          echo "==> Últimos 200 renglones de los 10 logs más recientes:"
          for f in $(ls -1t "$LOG_DIR" 2>/dev/null | head -n 10); do
            echo
            echo "----- $LOG_DIR/$f -----"
            tail -n 300 "$LOG_DIR/$f" || true
          done
    
